<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | KY Lab · 國立臺北科技大學</title>
  <meta name="description" content="KY Lab 活動花絮：實驗室日常、畢業典禮、競賽成果、研究展示照片與影片。">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🤖</text></svg>">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <meta name="google-site-verification" content="RQ12fc-hOMq_x1yrjFCUHl7oK_w1Fe56xZftTjvMvw4" />
  <link rel="stylesheet" href="css/style.css">
  <script>try { if (localStorage.getItem('saclab-theme') === 'dark') document.documentElement.classList.add('dark-theme'); } catch (e) { }</script>
</head>

<body>

  <div class="gallery-page">

    <!-- ===== 頁面標題 ===== -->
    <section class="page-section">
      <div class="section-header reveal">
        <div class="section-badge">📸 Lab Life</div>
        <h2 class="section-title">活動花絮</h2>
        <p class="section-desc">記錄 KY Lab 的精彩時刻、日常點滴與研究成果展示</p>
      </div>

      <!-- ===== 照片區 ===== -->
      <!-- 新增照片說明：
           1. 將照片放入 images/gallery/ 資料夾
           2. 複製一個 .gl-item 區塊，將 .gl-item-placeholder 換成 <img src="images/gallery/你的檔名.jpg" alt="說明">
           3. 修改 .gl-item-caption 的文字
      -->
      <h3 class="gl-section-title reveal">📷 照片集錦</h3>
      <div class="gl-photo-grid reveal">

        <div class="gl-item">
          <div class="gl-item-placeholder" style="background:linear-gradient(135deg,#B794F4,#64D2D6)">
            <span>📸</span>
            <p>新增照片</p>
          </div>
          <div class="gl-item-caption">實驗室日常</div>
        </div>

        <div class="gl-item">
          <div class="gl-item-placeholder" style="background:linear-gradient(135deg,#F6AD55,#F687B3);padding:60px 20px">
            <span>🎓</span>
            <p>新增照片</p>
          </div>
          <div class="gl-item-caption">畢業典禮</div>
        </div>

        <div class="gl-item">
          <div class="gl-item-placeholder" style="background:linear-gradient(135deg,#64D2D6,#B794F4)">
            <span>🏆</span>
            <p>新增照片</p>
          </div>
          <div class="gl-item-caption">競賽成果</div>
        </div>

        <div class="gl-item">
          <div class="gl-item-placeholder" style="background:linear-gradient(135deg,#F687B3,#F6AD55);padding:55px 20px">
            <span>🛸</span>
            <p>新增照片</p>
          </div>
          <div class="gl-item-caption">無人機展示</div>
        </div>

        <div class="gl-item">
          <div class="gl-item-placeholder" style="background:linear-gradient(135deg,#64D2D6,#F6AD55)">
            <span>🤝</span>
            <p>新增照片</p>
          </div>
          <div class="gl-item-caption">交流活動</div>
        </div>

        <div class="gl-item">
          <div class="gl-item-placeholder" style="background:linear-gradient(135deg,#B794F4,#F687B3);padding:65px 20px">
            <span>🎉</span>
            <p>新增照片</p>
          </div>
          <div class="gl-item-caption">慶祝活動</div>
        </div>

        <div class="gl-item">
          <div class="gl-item-placeholder" style="background:linear-gradient(135deg,#F6AD55,#64D2D6)">
            <span>💻</span>
            <p>新增照片</p>
          </div>
          <div class="gl-item-caption">研究討論</div>
        </div>

        <div class="gl-item">
          <div class="gl-item-placeholder" style="background:linear-gradient(135deg,#F687B3,#B794F4);padding:58px 20px">
            <span>🔬</span>
            <p>新增照片</p>
          </div>
          <div class="gl-item-caption">實驗進行中</div>
        </div>

        <div class="gl-item">
          <div class="gl-item-placeholder" style="background:linear-gradient(135deg,#64D2D6,#F687B3)">
            <span>🌟</span>
            <p>新增照片</p>
          </div>
          <div class="gl-item-caption">精彩時刻</div>
        </div>

      </div><!-- /gl-photo-grid -->

      <!-- ===== 影片區 ===== -->
      <!-- 新增影片說明：
           1. 複製一個 .gl-video-card 區塊
           2. 將 iframe src 中的 VIDEO_ID 換成 YouTube 影片 ID
              例如 https://www.youtube.com/watch?v=abcd1234  →  VIDEO_ID = abcd1234
           3. 修改標題與說明文字
      -->
      <h3 class="gl-section-title reveal" style="margin-top:60px">🎬 影片精選</h3>
      <div class="gl-video-grid reveal">

        <div class="gl-video-card">
          <div class="gl-video-embed">
            <!-- 將 VIDEO_ID 換成實際的 YouTube 影片 ID -->
            <iframe src="https://www.youtube.com/embed/xkfsnWIMpc8" title="KY Lab 研究成果展示"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>
          <div class="gl-video-info">
            <h3>研究成果展示</h3>
            <p>請將此 VIDEO_ID 換成實際的 YouTube 影片 ID</p>
          </div>
        </div>

        <div class="gl-video-card">
          <div class="gl-video-embed">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID" title="KY Lab 活動紀錄"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>
          <div class="gl-video-info">
            <h3>活動紀錄</h3>
            <p>請將此 VIDEO_ID 換成實際的 YouTube 影片 ID</p>
          </div>
        </div>

      </div><!-- /gl-video-grid -->
    </section>

  </div><!-- /gallery-page -->

  <!-- Lightbox -->
  <div class="gl-lightbox" id="glLightbox">
    <button class="gl-lightbox-close" id="glLightboxClose">✕</button>
    <img src="" alt="" id="glLightboxImg">
  </div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Lightbox：點擊有 <img> 的 .gl-item 即可放大
    document.querySelectorAll('.gl-item').forEach(item => {
      item.addEventListener('click', () => {
        const img = item.querySelector('img');
        if (!img) return;
        document.getElementById('glLightboxImg').src = img.src;
        document.getElementById('glLightboxImg').alt = img.alt;
        document.getElementById('glLightbox').classList.add('active');
      });
    });
    document.getElementById('glLightboxClose').addEventListener('click', () => {
      document.getElementById('glLightbox').classList.remove('active');
    });
    document.getElementById('glLightbox').addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
    });
  </script>
</body>

</html>
