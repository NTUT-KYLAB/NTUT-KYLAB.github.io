<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | KY Lab · 國立臺北科技大學</title>
  <meta name="description" content="KY Lab 活動花絮：實驗室日常、畢業典禮、競賽成果、研究展示照片與影片。">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🤖</text></svg>">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <meta name="google-site-verification" content="RQ12fc-hOMq_x1yrjFCUHl7oK_w1Fe56xZftTjvMvw4" />
  <link rel="canonical" href="https://kylab-ntut.github.io/gallery.html">
  <link rel="stylesheet" href="css/style.css">
  <script>try { if (localStorage.getItem('saclab-theme') === 'dark') document.documentElement.classList.add('dark-theme'); } catch (e) { }</script>
</head>

<body>

  <div class="gallery-page">

    <!-- ===== 頁面標題 ===== -->
    <section class="page-section">
      <div class="section-header reveal">
        <div class="section-badge">📸 Lab Life</div>
        <h2 class="section-title">活動花絮</h2>
        <p class="section-desc">記錄 KY Lab 的精彩時刻、日常點滴與研究成果展示</p>
      </div>

      <!-- ===== 活動相簿 ===== -->
      <!-- 新增活動說明：
           在 Google Drive 主資料夾中新增子資料夾（資料夾名稱即活動名稱），
           將照片放入該子資料夾，網頁會自動出現對應的活動卡片。
      -->
      <h3 class="gl-section-title reveal">📷 活動相簿</h3>
      <div class="gl-event-grid reveal" id="glEventGrid">
        <div class="gl-drive-loading">
          <div class="gl-drive-spinner"></div>
          <p>活動載入中...</p>
        </div>
      </div>

      <!-- ===== 影片區 ===== -->
      <!-- 新增影片說明：
           1. 複製一個 .gl-video-card 區塊
           2. 將 iframe src 中的 VIDEO_ID 換成 YouTube 影片 ID
              例如 https://www.youtube.com/watch?v=abcd1234  →  VIDEO_ID = abcd1234
           3. 修改標題與說明文字
      -->
      <h3 class="gl-section-title reveal" style="margin-top:60px">🎬 影片精選</h3>
      <div class="gl-video-grid reveal">

        <div class="gl-video-card">
          <div class="gl-video-embed">
            <iframe src="https://www.youtube.com/embed/xkfsnWIMpc8?autoplay=1&mute=1&loop=1&playlist=xkfsnWIMpc8&controls=0&playsinline=1&vq=hd1080" title="KY Lab 研究成果展示"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
            <a href="https://www.youtube.com/watch?v=xkfsnWIMpc8" target="_blank" rel="noopener" class="gl-video-overlay" aria-label="在 YouTube 觀看"></a>
          </div>
          <div class="gl-video-info">
            <h3>研究成果展示</h3>
          </div>
        </div>

        <div class="gl-video-card">
          <div class="gl-video-embed">
            <iframe src="https://www.youtube.com/embed/GOsvmJ28YwQ?autoplay=1&mute=1&loop=1&playlist=GOsvmJ28YwQ&controls=0&playsinline=1&vq=hd1080" title="KY Lab 活動紀錄"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
            <a href="https://youtu.be/GOsvmJ28YwQ" target="_blank" rel="noopener" class="gl-video-overlay" aria-label="在 YouTube 觀看"></a>
          </div>
          <div class="gl-video-info">
            <h3>活動紀錄</h3>
          </div>
        </div>

      </div><!-- /gl-video-grid -->
    </section>

  </div><!-- /gallery-page -->

  <!-- ===== 活動照片 Modal ===== -->
  <div class="gl-event-modal" id="glEventModal">
    <div class="gl-event-modal-inner">
      <div class="gl-event-modal-header">
        <h3 id="glModalTitle"></h3>
        <button class="gl-event-modal-close" id="glModalClose" aria-label="關閉">✕</button>
      </div>
      <div class="gl-photo-grid gl-modal-grid" id="glModalGrid"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="gl-lightbox" id="glLightbox">
    <button class="gl-lightbox-close" id="glLightboxClose">✕</button>
    <img src="" alt="" id="glLightboxImg">
  </div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      var FOLDER_ID = '1HHxoyxt6y71EgBPXXLb1V6R6s8T1vaLs';
      var API_KEY   = 'AIzaSyCpFx9VkFz5yY0oyC_MohaABssG0UFysqA';
      var eventGrid = document.getElementById('glEventGrid');
      var modal     = document.getElementById('glEventModal');
      var modalTitle = document.getElementById('glModalTitle');
      var modalGrid = document.getElementById('glModalGrid');
      var lb        = document.getElementById('glLightbox');
      var lbImg     = document.getElementById('glLightboxImg');

      function api(q, extra) {
        return 'https://www.googleapis.com/drive/v3/files'
          + '?q=' + encodeURIComponent(q)
          + '&fields=files(id,name)&key=' + API_KEY
          + (extra || '');
      }

      function thumb(id, w) {
        return 'https://drive.google.com/thumbnail?id=' + id + '&sz=w' + w;
      }

      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
      }

      // ── Lightbox ──
      document.getElementById('glLightboxClose').addEventListener('click', function () {
        lb.classList.remove('active'); lbImg.src = '';
      });
      lb.addEventListener('click', function (e) {
        if (e.target === e.currentTarget) { lb.classList.remove('active'); lbImg.src = ''; }
      });

      function openLightbox(fileId, alt) {
        lbImg.src = thumb(fileId, 2400);
        lbImg.alt = alt;
        lb.classList.add('active');
      }

      // ── Modal ──
      function openModal(folderId, folderName) {
        modalTitle.textContent = folderName;
        modalGrid.innerHTML = '<div class="gl-drive-loading"><div class="gl-drive-spinner"></div><p>載入中...</p></div>';
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';

        fetch(api("'" + folderId + "' in parents and mimeType contains 'image/' and trashed=false", '&orderBy=name&pageSize=200'))
          .then(function (r) { return r.json(); })
          .then(function (data) {
            modalGrid.innerHTML = '';
            shuffle(data.files || []).forEach(function (file) {
              var item = document.createElement('div');
              item.className = 'gl-item';
              var img = document.createElement('img');
              img.src = thumb(file.id, 600);
              img.alt = file.name.replace(/\.[^.]+$/, '');
              img.loading = 'lazy';
              item.appendChild(img);
              item.addEventListener('click', function () { openLightbox(file.id, img.alt); });
              modalGrid.appendChild(item);
            });
          })
          .catch(function () {
            modalGrid.innerHTML = '<p style="padding:30px;color:var(--text-muted)">載入失敗</p>';
          });
      }

      function closeModal() {
        modal.classList.remove('active');
        document.body.style.overflow = '';
        modalGrid.innerHTML = '';
      }

      document.getElementById('glModalClose').addEventListener('click', closeModal);
      modal.addEventListener('click', function (e) { if (e.target === modal) closeModal(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

      // ── 活動卡片 ──
      fetch(api("'" + FOLDER_ID + "' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false", '&orderBy=name'))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var folders = data.files || [];

          // 若無子資料夾，退回顯示根目錄散圖
          if (!folders.length) {
            return fetch(api("'" + FOLDER_ID + "' in parents and mimeType contains 'image/' and trashed=false", '&orderBy=name&pageSize=100'))
              .then(function (r) { return r.json(); })
              .then(function (d) {
                eventGrid.className = 'gl-photo-grid reveal active';
                eventGrid.innerHTML = '';
                shuffle(d.files || []).forEach(function (file) {
                  var item = document.createElement('div');
                  item.className = 'gl-item';
                  var img = document.createElement('img');
                  img.src = thumb(file.id, 800);
                  img.alt = file.name.replace(/\.[^.]+$/, '');
                  img.loading = 'lazy';
                  item.appendChild(img);
                  item.addEventListener('click', function () { openLightbox(file.id, img.alt); });
                  eventGrid.appendChild(item);
                });
              });
          }

          // 有子資料夾：取每個封面照
          return Promise.all(folders.map(function (folder) {
            return fetch(api("'" + folder.id + "' in parents and mimeType contains 'image/' and trashed=false", '&orderBy=name&pageSize=1'))
              .then(function (r) { return r.json(); })
              .then(function (d) {
                return { id: folder.id, name: folder.name, cover: d.files && d.files[0] ? d.files[0].id : null };
              });
          }));
        })
        .then(function (events) {
          if (!events) return; // 退回散圖已處理
          eventGrid.innerHTML = '';
          events.forEach(function (ev) {
            var card = document.createElement('div');
            card.className = 'gl-event-card';

            if (ev.cover) {
              var img = document.createElement('img');
              img.className = 'gl-event-cover';
              img.src = thumb(ev.cover, 600);
              img.alt = ev.name;
              img.loading = 'lazy';
              card.appendChild(img);
            } else {
              var ph = document.createElement('div');
              ph.className = 'gl-event-cover-ph';
              ph.innerHTML = '<span>📷</span>';
              card.appendChild(ph);
            }

            var count = document.createElement('div');
            count.className = 'gl-event-name';
            count.textContent = ev.name;
            card.appendChild(count);

            card.addEventListener('click', function () { openModal(ev.id, ev.name); });
            eventGrid.appendChild(card);
          });
        })
        .catch(function () {
          eventGrid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px">載入失敗，請稍後再試</p>';
        });
    })();
  </script>
</body>

</html>
