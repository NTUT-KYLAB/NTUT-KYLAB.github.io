<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | KY Lab · 國立臺北科技大學</title>
  <meta name="description" content="KY Lab 活動花絮：實驗室日常、畢業典禮、競賽成果、研究展示照片與影片。">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🤖</text></svg>">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <meta name="google-site-verification" content="RQ12fc-hOMq_x1yrjFCUHl7oK_w1Fe56xZftTjvMvw4" />
  <link rel="stylesheet" href="css/style.css">
  <script>try { if (localStorage.getItem('saclab-theme') === 'dark') document.documentElement.classList.add('dark-theme'); } catch (e) { }</script>
</head>

<body>

  <div class="gallery-page">

    <!-- ===== 頁面標題 ===== -->
    <section class="page-section">
      <div class="section-header reveal">
        <div class="section-badge">📸 Lab Life</div>
        <h2 class="section-title">活動花絮</h2>
        <p class="section-desc">記錄 KY Lab 的精彩時刻、日常點滴與研究成果展示</p>
      </div>

      <!-- ===== 照片區 ===== -->
      <!-- 新增照片說明：
           1. 將照片放入 images/gallery/ 資料夾
           2. 複製一個 .gl-item 區塊，將 .gl-item-placeholder 換成 <img src="images/gallery/你的檔名.jpg" alt="說明">
           3. 修改 .gl-item-caption 的文字
      -->
      <h3 class="gl-section-title reveal">📷 照片集錦</h3>
      <div class="gl-photo-grid reveal" id="glPhotoGrid">
        <div class="gl-drive-loading" id="glLoadState">
          <div class="gl-drive-spinner"></div>
          <p>照片載入中...</p>
        </div>
      </div><!-- /gl-photo-grid -->

      <!-- ===== 影片區 ===== -->
      <!-- 新增影片說明：
           1. 複製一個 .gl-video-card 區塊
           2. 將 iframe src 中的 VIDEO_ID 換成 YouTube 影片 ID
              例如 https://www.youtube.com/watch?v=abcd1234  →  VIDEO_ID = abcd1234
           3. 修改標題與說明文字
      -->
      <h3 class="gl-section-title reveal" style="margin-top:60px">🎬 影片精選</h3>
      <div class="gl-video-grid reveal">

        <div class="gl-video-card">
          <div class="gl-video-embed">
            <iframe src="https://www.youtube.com/embed/xkfsnWIMpc8?autoplay=1&mute=1&loop=1&playlist=xkfsnWIMpc8&controls=0&playsinline=1" title="KY Lab 研究成果展示"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
            <a href="https://www.youtube.com/watch?v=xkfsnWIMpc8" target="_blank" rel="noopener" class="gl-video-overlay" aria-label="在 YouTube 觀看"></a>
          </div>
          <div class="gl-video-info">
            <h3>研究成果展示</h3>
            <p>請將此 VIDEO_ID 換成實際的 YouTube 影片 ID</p>
          </div>
        </div>

        <div class="gl-video-card">
          <div class="gl-video-embed">
            <iframe src="https://www.youtube.com/embed/GOsvmJ28YwQ?autoplay=1&mute=1&loop=1&playlist=GOsvmJ28YwQ&controls=0&playsinline=1" title="KY Lab 活動紀錄"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
            <a href="https://youtu.be/GOsvmJ28YwQ" target="_blank" rel="noopener" class="gl-video-overlay" aria-label="在 YouTube 觀看"></a>
          </div>
          <div class="gl-video-info">
            <h3>活動紀錄</h3>
          </div>
        </div>

      </div><!-- /gl-video-grid -->
    </section>

  </div><!-- /gallery-page -->

  <!-- Lightbox -->
  <div class="gl-lightbox" id="glLightbox">
    <button class="gl-lightbox-close" id="glLightboxClose">✕</button>
    <img src="" alt="" id="glLightboxImg">
  </div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    // ── Google Drive 照片載入 ──
    (function () {
      var FOLDER_ID = '1HHxoyxt6y71EgBPXXLb1V6R6s8T1vaLs';
      var API_KEY   = 'AIzaSyCpFx9VkFz5yY0oyC_MohaABssG0UFysqA';
      var grid      = document.getElementById('glPhotoGrid');
      var lb        = document.getElementById('glLightbox');
      var lbImg     = document.getElementById('glLightboxImg');

      var apiUrl = 'https://www.googleapis.com/drive/v3/files'
        + '?q=%27' + FOLDER_ID + '%27+in+parents+and+mimeType+contains+%27image/%27'
        + '&fields=files(id,name)&orderBy=name&pageSize=100'
        + '&key=' + API_KEY;

      function thumbUrl(id, w) {
        return 'https://drive.google.com/thumbnail?id=' + id + '&sz=w' + w;
      }

      function openLightbox(fileId, alt) {
        lbImg.src = thumbUrl(fileId, 2400);
        lbImg.alt = alt;
        lb.classList.add('active');
      }

      fetch(apiUrl)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          grid.innerHTML = '';
          if (!data.files || !data.files.length) {
            grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px">暫無照片</p>';
            return;
          }
          data.files.forEach(function (file) {
            var item = document.createElement('div');
            item.className = 'gl-item';
            var img = document.createElement('img');
            img.src = thumbUrl(file.id, 800);
            img.alt = file.name.replace(/\.[^.]+$/, '');
            img.loading = 'lazy';
            img.dataset.fileId = file.id;
            item.appendChild(img);
            item.addEventListener('click', function () {
              openLightbox(file.id, img.alt);
            });
            grid.appendChild(item);
          });
        })
        .catch(function () {
          grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px">照片載入失敗，請稍後再試</p>';
        });

      // Lightbox 關閉
      document.getElementById('glLightboxClose').addEventListener('click', function () {
        lb.classList.remove('active');
        lbImg.src = '';
      });
      lb.addEventListener('click', function (e) {
        if (e.target === e.currentTarget) {
          lb.classList.remove('active');
          lbImg.src = '';
        }
      });
    })();
  </script>
</body>

</html>
