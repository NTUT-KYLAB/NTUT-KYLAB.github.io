window.runSeed = async function() {
  const btn = document.getElementById('seedBtn');
  const logEl = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = '填入中...';

  for (const m of members) {
    const { id, ...data } = m;
    try {
      await setDoc(doc(db, 'members', id), data, { merge: true });
      logEl.innerHTML += `<div class="log ok">✅ ${id} (${data.name})</div>`;
    } catch (err) {
      logEl.innerHTML += `<div class="log err">❌ ${id} — ${err.message}</div>`;
    }
  }

  logEl.innerHTML += `<div class="log ok" style="margin-top:12px;font-size:1.1rem;">🎉 完成！可以關掉這個頁面了。</div>`;
  btn.textContent = '完成';
};
