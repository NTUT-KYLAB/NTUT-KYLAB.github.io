  <script>
    (function () {
      const track   = document.getElementById('gpTrack');
      const stage   = document.getElementById('gpStage');
      const dotsWrap = document.getElementById('gpDots');
      if (!track || !stage) return;

      const slides = Array.from(track.querySelectorAll('.gp-slide'));
      const total  = slides.length;
      let current  = 0;
      let timer    = null;

      /* ── 建立 dots ── */
      slides.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = 'gp-dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', '第 ' + (i + 1) + ' 個');
        dot.addEventListener('click', () => goTo(i));
        dotsWrap.appendChild(dot);
      });

      if (total <= 1) stage.classList.add('gp-single');

      /* ── iframe 動態載入/卸載（避免多支影片同時播放）── */
      function loadSlide(index) {
        const slide = slides[index];
        if (slide.querySelector('iframe')) return;
        const id      = slide.dataset.yt;
        const url     = slide.dataset.url || '#';
        const caption = slide.dataset.caption || '';
        if (!id) return;
        slide.innerHTML =
          '<iframe src="https://www.youtube.com/embed/' + id +
          '?autoplay=1&mute=1&loop=1&playlist=' + id +
          '&controls=0&playsinline=1" title="' + caption +
          '" frameborder="0" allow="accelerometer; autoplay; clipboard-write;' +
          ' encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>' +
          '<a href="' + url + '" target="_blank" rel="noopener"' +
          ' class="gp-video-overlay" aria-label="在 YouTube 觀看"></a>' +
          '<div class="gp-caption">' + caption + '</div>';
      }

      function unloadSlide(index) {
        const iframe = slides[index].querySelector('iframe');
        if (iframe) iframe.remove();
      }

      function updateDots(index) {
        dotsWrap.querySelectorAll('.gp-dot').forEach(function (d, i) {
          d.classList.toggle('active', i === index);
        });
      }

      function goTo(index) {
        unloadSlide(current);
        current = (index + total) % total;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        loadSlide(current);
        updateDots(current);
        resetTimer();
      }

      function resetTimer() {
        clearInterval(timer);
        if (total > 1) timer = setInterval(function () { goTo(current + 1); }, 6000);
      }

      document.getElementById('gpPrev').addEventListener('click', function () { goTo(current - 1); });
      document.getElementById('gpNext').addEventListener('click', function () { goTo(current + 1); });

      loadSlide(0);
      resetTimer();

      /* ── Scroll → 逐漸全螢幕展開 ── */
      function onScroll() {
        var rect     = stage.getBoundingClientRect();
        var vh       = window.innerHeight;
        var progress = Math.min(1, Math.max(0, (vh - rect.top) / (vh * 0.55)));
        var pct      = (1 - progress) * 5;
        stage.style.marginLeft   = pct + '%';
        stage.style.marginRight  = pct + '%';
        stage.style.borderRadius = ((1 - progress) * 24) + 'px';
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>
