  <script>
    /* ── YouTube IFrame API ── */
    (function () {
      var s = document.createElement('script');
      s.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(s);
    })();
    var _ytReady = false, _ytQueue = [], _prevYTCb = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = function () {
      _ytReady = true;
      if (_prevYTCb) _prevYTCb();
      _ytQueue.forEach(function (fn) { fn(); });
      _ytQueue = [];
    };
    function whenYTReady(fn) { _ytReady ? fn() : _ytQueue.push(fn); }

    /* ── Carousel + Controls ── */
    (function () {
      var wrap      = document.getElementById('gpWrap');
      var stage     = document.getElementById('gpStage');
      var track     = document.getElementById('gpTrack');
      var dotsWrap  = document.getElementById('gpDots');
      var muteBtn   = document.getElementById('gpMuteBtn');
      var playBtn   = document.getElementById('gpPlayPause');
      var fsBtn     = document.getElementById('gpFullscreen');
      var timeEl    = document.getElementById('gpTime');
      var pTrack    = document.getElementById('gpProgressTrack');
      var pFill     = document.getElementById('gpProgressFill');
      var dThumb    = document.getElementById('gpDroneThumb');
      if (!wrap || !track) return;

      var slides    = Array.from(track.querySelectorAll('.gp-slide'));
      var total     = slides.length;
      var current   = 0;
      var isMuted   = false;   // 預設聲音跟 scroll 走
      var scrollVol = 0;       // 0~100
      var players   = {};
      var progTimer = null;
      var dragging  = false;

      /* ── dots ── */
      slides.forEach(function (_, i) {
        var dot = document.createElement('button');
        dot.className = 'gp-dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', '第 ' + (i + 1) + ' 個');
        dot.addEventListener('click', function () { goTo(i); });
        dotsWrap.appendChild(dot);
      });
      if (total <= 1) stage.classList.add('gp-single');

      /* ── 時間格式 ── */
      function fmt(s) {
        s = Math.floor(s || 0);
        var m = Math.floor(s / 60), ss = s % 60;
        return m + ':' + (ss < 10 ? '0' : '') + ss;
      }

      /* ── 進度條更新 ── */
      function updateProgress() {
        var p = players[current];
        if (!p || !p.getCurrentTime) return;
        var cur = p.getCurrentTime() || 0;
        var dur = p.getDuration() || 0;
        var pct = dur > 0 ? (cur / dur) * 100 : 0;
        setProgressUI(pct, cur, dur);
      }

      function setProgressUI(pct, cur, dur) {
        pFill.style.width = pct + '%';
        dThumb.style.left = pct + '%';
        if (timeEl) timeEl.textContent = fmt(cur) + ' / ' + fmt(dur);
      }

      function startProgress() {
        clearInterval(progTimer);
        progTimer = setInterval(function () { if (!dragging) updateProgress(); }, 250);
      }

      function stopProgress() { clearInterval(progTimer); }

      /* ── seek by click / drag ── */
      function seekFromEvent(e) {
        var rect = pTrack.getBoundingClientRect();
        var cx = e.touches ? e.touches[0].clientX : e.clientX;
        var pct = Math.max(0, Math.min(1, (cx - rect.left) / rect.width));
        var p = players[current];
        if (p && p.getDuration) {
          p.seekTo(pct * p.getDuration(), true);
          var dur = p.getDuration();
          setProgressUI(pct * 100, pct * dur, dur);
        }
      }
      pTrack.addEventListener('mousedown',  function (e) { dragging = true; seekFromEvent(e); });
      document.addEventListener('mousemove', function (e) { if (dragging) seekFromEvent(e); });
      document.addEventListener('mouseup',   function ()  { dragging = false; });
      pTrack.addEventListener('touchstart',  function (e) { dragging = true; seekFromEvent(e); }, { passive: true });
      document.addEventListener('touchmove', function (e) { if (dragging) seekFromEvent(e); }, { passive: true });
      document.addEventListener('touchend',  function ()  { dragging = false; });

      /* ── 播放/暫停 icon ── */
      function setPlayIcon(playing) {
        playBtn.querySelector('.icon-pause').style.display = playing ? '' : 'none';
        playBtn.querySelector('.icon-play').style.display  = playing ? 'none' : '';
        playBtn.setAttribute('aria-label', playing ? '暫停' : '播放');
      }

      /* ── 音量 ── */
      function applyVolume() {
        var p = players[current];
        if (!p || !p.setVolume) return;
        var vol = isMuted ? 0 : Math.round(scrollVol);
        if (vol > 0) { try { p.unMute(); } catch (err) {} }
        p.setVolume(vol);
      }

      /* ── 載入 slide ── */
      function loadSlide(index) {
        if (players[index]) return;
        var slide   = slides[index];
        var ytId    = slide.dataset.yt;
        var url     = slide.dataset.url || '#';
        var caption = slide.dataset.caption || '';
        if (!ytId) return;

        var div = document.createElement('div');
        div.id  = 'gp-player-' + index;
        slide.appendChild(div);

        var a = document.createElement('a');
        a.href = url; a.target = '_blank'; a.rel = 'noopener';
        a.className = 'gp-video-overlay';
        a.setAttribute('aria-label', '在 YouTube 觀看');
        slide.appendChild(a);

        var cap = document.createElement('div');
        cap.className = 'gp-caption';
        cap.textContent = caption;
        slide.appendChild(cap);

        whenYTReady(function () {
          players[index] = new YT.Player('gp-player-' + index, {
            videoId: ytId,
            playerVars: { autoplay: 1, mute: 1, controls: 0, playsinline: 1, rel: 0, modestbranding: 1, hd: 1 },
            events: {
              onReady: function (e) {
                /* 不在這裡 unMute()：手機瀏覽器要求使用者手勢才能解除靜音，
                   否則會擋掉整個自動播放。音量由 applyVolume() 按需求控制。 */
                e.target.setVolume(0);
                e.target.playVideo();
              },
              onStateChange: function (e) {
                if (e.data === YT.PlayerState.PLAYING) {
                  startProgress(); setPlayIcon(true);
                } else if (e.data === YT.PlayerState.PAUSED) {
                  stopProgress(); setPlayIcon(false);
                } else if (e.data === YT.PlayerState.ENDED) {
                  stopProgress();
                  setProgressUI(100, players[current] ? players[current].getDuration() : 0,
                                     players[current] ? players[current].getDuration() : 0);
                  goTo(current + 1);
                }
              }
            }
          });
        });
      }

      function unloadSlide(index) {
        stopProgress();
        if (players[index]) { try { players[index].destroy(); } catch (e) {} delete players[index]; }
        slides[index].innerHTML = '';
        setProgressUI(0, 0, 0);
        setPlayIcon(true);
      }

      function updateDots(index) {
        dotsWrap.querySelectorAll('.gp-dot').forEach(function (d, i) {
          d.classList.toggle('active', i === index);
        });
      }

      function goTo(index) {
        unloadSlide(current);
        current = (index + total) % total;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        loadSlide(current);
        updateDots(current);
      }

      /* ── 播放/暫停按鈕 ── */
      playBtn.addEventListener('click', function () {
        var p = players[current];
        if (!p) return;
        if (p.getPlayerState() === YT.PlayerState.PLAYING) { p.pauseVideo(); }
        else { p.playVideo(); }
      });

      /* ── 靜音按鈕 ── */
      muteBtn.addEventListener('click', function () {
        isMuted = !isMuted;
        muteBtn.querySelector('.icon-muted').style.display   = isMuted ? '' : 'none';
        muteBtn.querySelector('.icon-unmuted').style.display = isMuted ? 'none' : '';
        muteBtn.setAttribute('aria-label', isMuted ? '開啟聲音' : '關閉聲音');
        applyVolume();
      });

      /* ── 全螢幕 ── */
      fsBtn.addEventListener('click', function () {
        if (!document.fullscreenElement) {
          (wrap.requestFullscreen || wrap.webkitRequestFullscreen).call(wrap);
        } else {
          (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        }
      });
      document.addEventListener('fullscreenchange', function () {
        var inFs = !!document.fullscreenElement;
        fsBtn.querySelector('.icon-expand').style.display   = inFs ? 'none' : '';
        fsBtn.querySelector('.icon-compress').style.display = inFs ? '' : 'none';
      });

      /* ── 箭頭 ── */
      document.getElementById('gpPrev').addEventListener('click', function () { goTo(current - 1); });
      document.getElementById('gpNext').addEventListener('click', function () { goTo(current + 1); });

      /* ── Scroll：全螢幕展開 + 音量漸變 ── */
      function onScroll() {
        var rect     = wrap.getBoundingClientRect();
        var vh       = window.innerHeight;
        var progress = Math.min(1, Math.max(0, (vh - rect.top) / (vh * 0.55)));
        var pct      = (1 - progress) * 5;
        wrap.style.marginLeft   = pct + '%';
        wrap.style.marginRight  = pct + '%';
        wrap.style.borderRadius = ((1 - progress) * 20) + 'px';
        scrollVol = progress * 100;
        applyVolume();
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      loadSlide(0);
      onScroll();
    })();
  </script>

  <script>
    /* ── Google Drive 照片輪播帶（每個活動各取一張封面）── */
    (function () {
      var FOLDER_ID = '1HHxoyxt6y71EgBPXXLb1V6R6s8T1vaLs';
      var API_KEY   = 'AIzaSyCpFx9VkFz5yY0oyC_MohaABssG0UFysqA';
      var strip     = document.getElementById('gpPhotoStrip');
      var prevBtn   = document.getElementById('gpPsPrev');
      var nextBtn   = document.getElementById('gpPsNext');
      var outer     = document.getElementById('gpPhotoOuter');
      if (!strip) return;

      function api(q, extra) {
        return 'https://www.googleapis.com/drive/v3/files'
          + '?q=' + encodeURIComponent(q)
          + '&fields=files(id,name)&key=' + API_KEY + (extra || '');
      }

      function thumb(id) {
        return 'https://drive.google.com/thumbnail?id=' + id + '&sz=w600';
      }

      function addPhoto(fileId, alt) {
        var img = document.createElement('img');
        img.className = 'gp-ps-photo';
        img.src = thumb(fileId);
        img.alt = alt;
        img.loading = 'lazy';
        strip.appendChild(img);
      }

      function initArrows() {
        var amt = 320;
        prevBtn.addEventListener('click', function () { strip.scrollBy({ left: -amt, behavior: 'smooth' }); });
        nextBtn.addEventListener('click', function () { strip.scrollBy({ left:  amt, behavior: 'smooth' }); });
      }

      // 先嘗試抓子資料夾，每個活動取一張封面
      fetch(api("'" + FOLDER_ID + "' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false", '&orderBy=name'))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var folders = data.files || [];

          if (!folders.length) {
            // 無子資料夾：退回顯示根目錄前 20 張
            return fetch(api("'" + FOLDER_ID + "' in parents and mimeType contains 'image/' and trashed=false", '&orderBy=name&pageSize=20'))
              .then(function (r) { return r.json(); })
              .then(function (d) {
                strip.innerHTML = '';
                (d.files || []).forEach(function (f) { addPhoto(f.id, f.name); });
                if (!d.files || !d.files.length) outer.style.display = 'none';
                else initArrows();
              });
          }

          // 有子資料夾：每個資料夾抓多張，隨機選一張
          return Promise.all(folders.map(function (folder) {
            return fetch(api("'" + folder.id + "' in parents and mimeType contains 'image/' and trashed=false", '&orderBy=name&pageSize=50'))
              .then(function (r) { return r.json(); })
              .then(function (d) {
                var files = d.files || [];
                if (!files.length) return null;
                return files[Math.floor(Math.random() * files.length)];
              });
          }));
        })
        .then(function (covers) {
          if (!covers) return; // 已由退回處理
          strip.innerHTML = '';
          covers.filter(Boolean).forEach(function (f) { addPhoto(f.id, f.name); });
          if (!covers.filter(Boolean).length) outer.style.display = 'none';
          else initArrows();
        })
        .catch(function () { outer.style.display = 'none'; });
    })();
  </script>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
